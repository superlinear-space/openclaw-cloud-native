apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-llmlite
  namespace: openclaw
  labels:
    app: openclaw-llmlite
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw-llmlite
  template:
    metadata:
      labels:
        app: openclaw-llmlite
    spec:
      nodeSelector:
        openclaw-enabled: "true"
      containers:
      - name: llmlite
        image: docker.litellm.ai/berriai/litellm:main-latest
        env:
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-llmlite
              key: LITELLM_MASTER_KEY
        - name: LITELLM_SALT_KEY
          valueFrom:
            secretKeyRef:
              name: openclaw-llmlite
              key: LITELLM_SALT_KEY
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: openclaw-llmlite
              key: DATABASE_URL
              optional: true
        ports:
        - containerPort: 4000
          name: llmlite
        volumeMounts:
        - name: llmlite-storage
          mountPath: /app/litellm-data
        command: ["litellm", "--config", "/app/litellm-data/config.yaml", "--detailed_debug"]
      volumes:
      - name: llmlite-storage
        persistentVolumeClaim:
          claimName: openclaw-llmlite-storage-pvc
